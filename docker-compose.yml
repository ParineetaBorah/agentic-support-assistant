services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: acme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d acme"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./infra/keycloak/acme-realm.json:/opt/keycloak/data/import/acme-realm.json:ro
    command: ["start-dev", "--import-realm"]
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /realms/acme HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    ports:
      - "4000:4000"
    volumes:
      - ./infra/litellm/config.yaml:/app/config.yaml
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    command: ["--config", "/app/config.yaml", "--port", "4000"]

  migrate:
    build: ./api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_URL: postgresql://postgres:postgres@postgres:5432/acme
    command: bash -c "alembic upgrade head && python db/seed.py"
    restart: "no"

  mcp_server:
    build: ./mcp_server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_URL: postgresql://postgres:postgres@postgres:5432/acme
      LITELLM_URL: http://litellm:4000
      LITELLM_API_KEY: ${LITELLM_API_KEY}
      LITELLM_MODEL: ${LITELLM_MODEL:-gpt-4o-mini}
      MCP_SERVER_HOST: 0.0.0.0
      MCP_SERVER_PORT: "8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 8001), 2)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  api:
    build: ./api
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      keycloak:
        condition: service_healthy
      redis:
        condition: service_healthy
      litellm:
        condition: service_started
      mcp_server:
        condition: service_healthy
    environment:
      POSTGRES_URL: postgresql://postgres:postgres@postgres:5432/acme
      REDIS_URL: redis://redis:6379
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: acme
      KEYCLOAK_CLIENT_ID: acme-api
      KEYCLOAK_CLIENT_SECRET: acme-api-secret
      LITELLM_URL: http://litellm:4000
      LITELLM_API_KEY: ${LITELLM_API_KEY}
      LITELLM_MODEL: ${LITELLM_MODEL:-gpt-4o-mini}
      MCP_SERVER_URL: http://mcp_server:8001/mcp
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_PROJECT: acme-agent
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  ui:
    build:
      context: ./ui
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - api
    restart: unless-stopped

  # One-off eval runner — no host Python/venv needed. Not started by
  # `docker compose up` (gated behind the "eval" profile). Run with:
  #   docker compose run --rm eval                      # fast: trajectory only
  #   docker compose run --rm -e RAGAS_ENABLED=true eval  # full: + grounding + reasonableness
  eval:
    build: ./eval
    profiles: ["eval"]
    depends_on:
      api:
        condition: service_started
      keycloak:
        condition: service_healthy
      postgres:
        condition: service_healthy
      litellm:
        condition: service_started
    environment:
      API_URL: http://api:8000
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: acme
      KEYCLOAK_CLIENT_ID: acme-api
      KEYCLOAK_CLIENT_SECRET: acme-api-secret
      POSTGRES_URL: postgresql://postgres:postgres@postgres:5432/acme
      LITELLM_URL: http://litellm:4000
      LITELLM_API_KEY: ${LITELLM_API_KEY}
      EVAL_JUDGE_MODEL: ${EVAL_JUDGE_MODEL:-gpt-4o}
      RAGAS_ENABLED: ${RAGAS_ENABLED:-false}
    volumes:
      - ./eval:/app

volumes:
  postgres_data:
